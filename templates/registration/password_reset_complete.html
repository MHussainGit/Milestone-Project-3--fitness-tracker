{% extends "base.html" %}
{% block title %}Password Reset Complete{% endblock %}

{% block content %}
<div class="auth-wrap">
  <div class="auth-box">
    <h1>Password Updated</h1>
    <p class="auth-box__sub">Your password has been set. You can now sign in.</p>
    <div class="form-actions">
      <a href="{% url 'login' %}" class="btn btn-primary btn-full">Sign In</a>
    </div>
  </div>
</div>
{% endblock %}
