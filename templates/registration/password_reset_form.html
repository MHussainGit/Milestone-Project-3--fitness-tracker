{% extends "base.html" %}
{% block title %}Reset Password{% endblock %}

{% block content %}
<div class="auth-wrap">
  <div class="auth-box">
    <h1>Reset Password</h1>
    <p class="auth-box__sub">Enter your email and we'll send you a reset link.</p>

    <form method="post" novalidate>
      {% csrf_token %}
      <div class="form-group">
        <label for="{{ form.email.id_for_label }}" class="form-label">Email address</label>
        {{ form.email }}
        {% if form.email.errors %}
          <div class="invalid-feedback d-block" role="alert">{{ form.email.errors.0 }}</div>
        {% endif %}
      </div>
      <div class="form-actions">
        <button type="submit" class="btn btn-primary btn-full">Send Reset Link</button>
      </div>
    </form>

    <p class="auth-box__footer"><a href="{% url 'login' %}">Back to login</a></p>
  </div>
</div>
{% endblock %}
