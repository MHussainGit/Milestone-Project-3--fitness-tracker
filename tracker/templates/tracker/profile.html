{% extends "base.html" %}
{% block title %}My Profile{% endblock %}

{% block content %}
<div class="container-sm">
  <div class="page-header">
    <h1>My Profile</h1>
  </div>

  <div class="form-card">
    <div class="profile-details">
      <div class="profile-row">
        <span class="profile-label">Username</span>
        <span class="profile-value">{{ user_profile.username }}</span>
      </div>
      <div class="profile-row">
        <span class="profile-label">Email</span>
        <span class="profile-value">{{ user_profile.email|default:'Not provided' }}</span>
      </div>
      <div class="profile-row">
        <span class="profile-label">Member since</span>
        <span class="profile-value">{{ user_profile.date_joined|date:'F j, Y' }}</span>
      </div>
    </div>

    <div class="form-actions" style="margin-top: 2rem; justify-content: flex-start; gap: 1rem;">
      <a href="{% url 'profile_delete' %}" class="btn btn-danger">Delete Profile</a>
      <a href="{% url 'dashboard' %}" class="btn btn-secondary">Back to Dashboard</a>
    </div>
  </div>
</div>
{% endblock %}
